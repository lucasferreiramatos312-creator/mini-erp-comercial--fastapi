<!DOCTYPE html>
<html>

<head>
    <title>Sistema Completo</title>
</head>

<body>

    <h1> Usuário</h1>

    <h3>Cadastro</h3>
    <input id="nomeCadastro" placeholder="Nome">
    <input id="emailCadastro" placeholder="Email">
    <input id="senhaCadastro" type="password" placeholder="Senha">
    <button onclick="cadastrar()">Cadastrar</button>

    <h3>Login</h3>
    <input id="emailLogin" placeholder="Email">
    <input id="senhaLogin" type="password" placeholder="Senha">
    <button onclick="login()">Login</button>

    <hr>

    <h1> Produtos</h1>

    <h3>Criar / Atualizar</h3>
    <input id="nomeProduto" placeholder="Nome">
    <input id="valorProduto" placeholder="Valor">
    <button onclick="salvarProduto()">Salvar</button>

    <h3>Buscar por ID</h3>
    <input id="buscarId" placeholder="ID">
    <button onclick="buscarProduto()">Buscar</button>

    <h3>Lista</h3>
    <button onclick="listarProdutos()">Atualizar Lista</button>
    <ul id="lista"></ul>

    <script>

        let token = "";
        let produtoEditando = null;

        // ================= USUÁRIO =================

        async function cadastrar() {
            const nome = document.getElementById("nomeCadastro").value;
            const email = document.getElementById("emailCadastro").value;
            const senha = document.getElementById("senhaCadastro").value;

            await fetch("http://127.0.0.1:8000/auth/registrar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nome: nome, email: email, senha: senha })
            });

            alert("Usuário criado!");
        }

        async function login() {
            const email = document.getElementById("emailLogin").value;
            const senha = document.getElementById("senhaLogin").value;

            const res = await fetch("http://127.0.0.1:8000/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, senha: senha })
            });

            const data = await res.json();
            token = data.access_token;

            console.log("TOKEN:", token);

            alert("Logado!");
        }

        // ================= PRODUTOS =================

        async function salvarProduto() {
            if (!token) {
                alert("Faça login primeiro!");
                return;
            }

            const nome_produto = document.getElementById("nomeProduto").value;
            const valor = parseFloat(document.getElementById("valorProduto").value);

            if (produtoEditando !== null) {

                await fetch("http://localhost:8000/api/produtos/" + produtoEditando, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        nome_produto: nome_produto,
                        valor: valor
                    })
                });

                produtoEditando = null;
                alert("Atualizado!");

            } else {

                await fetch("http://localhost:8000/api/produtos", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({
                        nome_produto: nome_produto,
                        valor: valor
                    })
                });

                alert("Criado!");
            }

            listarProdutos();
        }

        async function listarProdutos() {

            if (!token) {
                alert("Faça login primeiro!");
                return;
            }

            const res = await fetch("http://localhost:8000/api/produtos", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const produtos = await res.json();

            const lista = document.getElementById("lista");
            lista.innerHTML = "";

            produtos.forEach(function (p) {

                const li = document.createElement("li");

                li.innerHTML =
                    p.produto + " - R$ " + p.valor +
                    " <button onclick='editar(" + p.id + ", \"" + p.produto + "\", " + p.valor + ")'>Editar</button>" +
                    " <button onclick='deletar(" + p.id + ")'>Excluir</button>";

                lista.appendChild(li);
            });
        }

        function editar(id, nome, valor) {
            document.getElementById("nomeProduto").value = nome;
            document.getElementById("valorProduto").value = valor;
            produtoEditando = id;
        }

        async function deletar(id) {

            if (!token) {
                alert("Faça login primeiro!");
                return;
            }

            await fetch("http://localhost:8000/api/produtos/" + id, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            listarProdutos();
        }

        async function buscarProduto() {

            if (!token) {
                alert("Faça login primeiro!");
                return;
            }

            const id = document.getElementById("buscarId").value;

            const res = await fetch("http://localhost:8000/api/produtos/" + id, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const p = await res.json();

            alert(p.produto + " - R$ " + p.valor);
        }

    </script>

</body>

</html>
