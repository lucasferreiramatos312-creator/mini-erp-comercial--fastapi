version: "3.9"

services:
  db:
    image: postgres:17
    container_name: minierp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: minierp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgress$@!Lucas8789*
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: minierp-api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
    restart: unless-stopped
  
volumes:
  postgres_data: